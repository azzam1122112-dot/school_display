services:
  - type: redis
    name: school-display-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: redis
    name: school-display-channels-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: school-display
    runtime: python
    plan: starter
    # Current runtime topology intentionally keeps a single Render web service.
    # Snapshot materialization and wake scheduling still run as embedded child
    # processes of this service; they are not standalone Render services yet.

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput

    startCommand: |
      set -e
      python manage.py migrate --noinput

      if [ -n "$DJANGO_SUPERUSER_USERNAME" ] && [ -n "$DJANGO_SUPERUSER_PASSWORD" ]; then
        python manage.py createsuperuser \
          --noinput \
          --username "$DJANGO_SUPERUSER_USERNAME" \
          --email "${DJANGO_SUPERUSER_EMAIL:-admin@example.com}" || true
      fi

      # IMPORTANT:
      # - If REDIS_CACHE_URL / CACHE_REDIS_URL / REDIS_URL is missing, Django cannot use shared cache.
      # - With multiple gunicorn workers, that breaks cache coherence and causes repeated snapshot_build/cache=MISS.
      WORKERS=${WEB_CONCURRENCY:-2}
      EFFECTIVE_CACHE_REDIS_URL="${REDIS_CACHE_URL:-${CACHE_REDIS_URL:-$REDIS_URL}}"
      if [ -z "$EFFECTIVE_CACHE_REDIS_URL" ]; then
        echo "[WARN] REDIS_CACHE_URL/CACHE_REDIS_URL/REDIS_URL is not set; forcing WORKERS=1 to avoid per-process cache misses."
        WORKERS=1
      fi

      # Embedded runtime loops:
      # - These are separate child processes started by the web service shell.
      # - They are not Gunicorn workers and they are not independent services.
      # - Disable them here only after equivalent dedicated services exist.
      SNAPSHOT_WORKER_PID=""
      if [ "${DISPLAY_START_EMBEDDED_SNAPSHOT_WORKER:-True}" = "True" ]; then
        python manage.py display_snapshot_worker --poll-timeout=5 &
        SNAPSHOT_WORKER_PID=$!
        echo "[INFO] started embedded snapshot worker pid=${SNAPSHOT_WORKER_PID}"
      fi

      WAKE_SCHEDULER_PID=""
      if [ "${DISPLAY_START_EMBEDDED_WAKE_SCHEDULER:-True}" = "True" ]; then
        python manage.py display_wake_scheduler \
          --interval="${DISPLAY_WAKE_SCAN_INTERVAL:-60}" \
          --lead-minutes="${DISPLAY_WAKE_LEAD_MINUTES:-30}" \
          --window-seconds="${DISPLAY_WAKE_WINDOW_SECONDS:-90}" &
        WAKE_SCHEDULER_PID=$!
        echo "[INFO] started embedded wake scheduler pid=${WAKE_SCHEDULER_PID}"
      fi

      cleanup() {
        if [ -n "$SNAPSHOT_WORKER_PID" ]; then
          kill "$SNAPSHOT_WORKER_PID" 2>/dev/null || true
        fi
        if [ -n "$WAKE_SCHEDULER_PID" ]; then
          kill "$WAKE_SCHEDULER_PID" 2>/dev/null || true
        fi
      }
      trap cleanup TERM INT EXIT

      # Run as ASGI to support WebSockets (/ws/display/) for realtime screen refresh.
      # Gunicorn + UvicornWorker supports both HTTP and WebSocket.
      gunicorn config.asgi:application \
        -k uvicorn.workers.UvicornWorker \
        --bind 0.0.0.0:$PORT \
        --workers=$WORKERS \
        --timeout=120 \
        --keep-alive=5 \
        --log-level=info \
        --access-logfile - \
        --error-logfile -

    healthCheckPath: "/"

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings

      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      - key: MIDDLEWARE_DEBUG
        value: "False"

      - key: DISPLAY_SNAPSHOT_ACTIVE_TTL
        value: "45"
      - key: DISPLAY_SNAPSHOT_TTL_JITTER_SEC
        value: "10"

      # Safe canary controls for snapshot cache behavior (disabled by default).
      - key: SNAPSHOT_STEADY_CACHE_V2
        value: "False"
      - key: DISPLAY_SNAPSHOT_ACTIVE_TTL_SAFE_MIN
        value: "30"

      - key: DISPLAY_SNAPSHOT_STEADY_MAX_TTL
        value: "86400"
      - key: SCHOOL_SNAPSHOT_TTL
        value: "900"

      - key: DISPLAY_SNAPSHOT_CACHE_METRICS_INTERVAL_SEC
        value: "600"

      - key: DISPLAY_WS_ENABLED
        value: "True"
      - key: DISPLAY_SNAPSHOT_ASYNC_BUILD
        value: "True"
      - key: DISPLAY_SNAPSHOT_INLINE_FALLBACK
        value: "False"
      # Keep these enabled while the worker/scheduler still live inside the web
      # service. Turn them off only when equivalent dedicated services exist.
      - key: DISPLAY_START_EMBEDDED_SNAPSHOT_WORKER
        value: "True"
      - key: DISPLAY_START_EMBEDDED_WAKE_SCHEDULER
        value: "True"
      - key: DISPLAY_WAKE_SCAN_INTERVAL
        value: "60"
      - key: DISPLAY_WAKE_LEAD_MINUTES
        value: "30"
      - key: DISPLAY_WAKE_WINDOW_SECONDS
        value: "90"
      - key: DISPLAY_REQUIRE_REDIS_SPLIT
        value: "True"
      - key: DISPLAY_PUBLIC_BASE_URL
        value: "https://school-display.com"
      - key: SITE_BASE_URL
        value: "https://school-display.com"

      - key: ALLOWED_HOSTS
        value: "school-display.com,www.school-display.com,school-display-p8ec.onrender.com,.onrender.com"

      - key: CSRF_TRUSTED_ORIGINS
        value: "https://school-display.com,https://www.school-display.com,https://school-display-p8ec.onrender.com"

      - key: WEB_CONCURRENCY
        value: "2"

      - key: REDIS_URL
        fromService:
          name: school-display-redis
          type: redis
          property: connectionString
      - key: REDIS_CACHE_URL
        fromService:
          name: school-display-redis
          type: redis
          property: connectionString
      - key: REDIS_CHANNELS_URL
        fromService:
          name: school-display-channels-redis
          type: redis
          property: connectionString
      - key: CACHE_REDIS_URL
        fromService:
          name: school-display-redis
          type: redis
          property: connectionString
      - key: CHANNELS_REDIS_URL
        fromService:
          name: school-display-channels-redis
          type: redis
          property: connectionString
      - key: REDIS_MAX_CONNECTIONS
        value: "20"
      - key: CACHE_REDIS_MAX_CONNECTIONS
        value: "20"
      - key: DISPLAY_SNAPSHOT_DEBOUNCE_SEC
        value: "3"
      - key: DISPLAY_SNAPSHOT_PENDING_TTL_SEC
        value: "30"
      - key: DISPLAY_SNAPSHOT_LATEST_REV_TTL_SEC
        value: "120"

      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      - key: FIREBASE_CREDENTIALS_BASE64
        sync: false

      - key: DATABASE_URL
        sync: false

    autoDeploy: true
